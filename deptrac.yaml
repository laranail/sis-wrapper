# The boundary. Gated in CI.
#
# This is the Laravel wrapper. It consumes the pure SDK (Simtabi\SIS\) and Illuminate + the laranail
# toolkits. The one rule that matters: the wrapper may depend on the SDK, but the SDK is a separate
# package that must never depend back on the wrapper (that direction is enforced in the SDK repo's own
# deptrac). Here we assert the wrapper is allowed to reach the SDK / framework.
deptrac:
  paths:
    - ./src
    - ./database/factories
    - ./database/seeders

  layers:
    - name: Wrapper
      collectors:
        - type: directory
          value: src/.*
        - type: directory
          value: database/(factories|seeders)/.*

    - name: Sdk
      collectors:
        - type: classNameRegex
          value: '#^Simtabi\\SIS\\#'

    - name: Illuminate
      collectors:
        - type: classNameRegex
          value: '#^Illuminate\\#'

    - name: Laranail
      collectors:
        - type: classNameRegex
          value: '#^Simtabi\\Laranail\\(Package|Console|Enumerator|Toolkit)\\#'

  ruleset:
    Wrapper:
      - Sdk
      - Illuminate
      - Laranail
    # Sdk / Illuminate / Laranail are external tokens with no allowed dependents inside this repo.
