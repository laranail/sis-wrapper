name: PostgreSQL triggers

# The storage-layer immutability guarantee (§6.4) is enforced by PostgreSQL triggers — an append-only audit
# table, a frozen commissioned row, no serial reuse. These tests need a real PostgreSQL, so they run here
# only (never in the SQLite-backed local suite). The `pgsql` group holds them.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postgres-${{ github.ref }}
  cancel-in-progress: true

jobs:
  triggers:
    name: Trigger enforcement · PostgreSQL 17
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: sis
          POSTGRES_PASSWORD: sis
          POSTGRES_DB: sis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: sis_test
      DB_USERNAME: sis
      DB_PASSWORD: sis

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fetch sibling laranail packages
        run: |
          git clone --depth 1 https://github.com/laranail/console.git ../console
          git clone --depth 1 https://github.com/laranail/package-tools.git ../package-tools
          git clone --depth 1 https://github.com/laranail/enumerator.git ../enumerator
          git clone --depth 1 https://github.com/laranail/toolkit.git ../toolkit
          git clone --depth 1 https://github.com/simtabi/sis-sdk.git ../../simtabi/sis-sdk

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo, intl, pdo, pgsql, pdo_pgsql
          coverage: none
          ini-values: error_reporting=E_ALL

      - name: Install dependencies
        run: composer update --prefer-stable --no-interaction --no-progress

      - name: Run the PostgreSQL trigger tests
        run: vendor/bin/phpunit --group pgsql
